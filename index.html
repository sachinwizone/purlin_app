<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pushpak Infra Steel – Purlin Automation App</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --primary:#1a3c5e; --accent:#e67e22; --green:#27ae60;
  --red:#e74c3c; --bg:#f0f4f8; --card:#fff; --border:#dde3ec;
  --text:#2c3e50; --muted:#7f8c8d; --sidebar:240px;
  --purple:#8e44ad; --blue:#2980b9; --teal:#16a085;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--primary);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;height:100vh;z-index:100;overflow-y:auto;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);}
.sidebar-logo h2{font-size:14px;font-weight:700;line-height:1.4;}
.sidebar-logo span{font-size:11px;opacity:.6;}
.sidebar-logo .powered{font-size:10px;opacity:.4;margin-top:4px;}
.nav-section{padding:10px 0 4px;}
.nav-section-label{font-size:10px;letter-spacing:1.2px;opacity:.45;padding:6px 16px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;transition:.2s;border-left:3px solid transparent;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);}
.nav-item.active{background:rgba(255,255,255,.13);border-left-color:var(--accent);font-weight:600;}
.nav-step-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-step-num.done{background:var(--green);}
.nav-step-num.active{background:var(--accent);}
.nav-icon{font-size:15px;min-width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;}
.nav-badge.new-badge{background:var(--red);}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;opacity:.5;margin-top:auto;}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar h1{font-size:17px;color:var(--primary);font-weight:700;}
.topbar-right{display:flex;gap:10px;align-items:center;}
.topbar-pill{background:#f0f4f8;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#2d6a9f;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:#d35400;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#219a52;}
.btn-outline{background:#fff;color:var(--primary);border:1px solid var(--border);}
.btn-outline:hover{background:#f5f7fa;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.page{padding:24px;flex:1;}

/* ── WORKFLOW PROGRESS BAR ── */
.workflow-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;overflow-x:auto;}
.workflow-steps{display:flex;align-items:center;min-width:700px;}
.wf-step{display:flex;align-items:center;flex:1;}
.wf-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1;}
.wf-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:.2s;}
.wf-dot:hover{border-color:var(--accent);}
.wf-dot.wf-done{background:var(--green);border-color:var(--green);color:#fff;}
.wf-dot.wf-active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 3px rgba(230,126,34,.25);}
.wf-label{font-size:10px;color:var(--muted);text-align:center;white-space:nowrap;}
.wf-label.wf-active{color:var(--accent);font-weight:600;}
.wf-label.wf-done{color:var(--green);}
.wf-line{flex:1;height:2px;background:var(--border);margin:0 2px;margin-bottom:20px;}
.wf-line.wf-done{background:var(--green);}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.stat-val{font-size:30px;font-weight:800;color:var(--primary);}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px;}
.stat-icon{font-size:26px;float:right;}
.stat-sub{font-size:11px;color:var(--green);margin-top:6px;font-weight:600;}

/* ── STATUS ── */
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.status-new{background:#e3f2fd;color:#1565c0;}
.status-processing{background:#fff3e0;color:#e65100;}
.status-review{background:#f3e5f5;color:#6a1b9a;}
.status-approved{background:#e8f5e9;color:#2e7d32;}
.status-dispatched{background:#e0f2f1;color:#00695c;}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f8f9fb;color:var(--muted);padding:10px 12px;text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid var(--border);}
td{padding:11px 12px;border-bottom:1px solid var(--border);}
tr:hover td{background:#fafbfc;}
.td-bold{font-weight:700;color:var(--primary);}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s;background:#fafbfc;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#fff8f3;}
.upload-icon{font-size:44px;margin-bottom:10px;}
.upload-zone h3{color:var(--primary);margin-bottom:6px;}
.upload-zone p{color:var(--muted);font-size:13px;}
.file-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.chip{background:#e8f0fe;color:#3c5a9a;padding:5px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px;}
.chip-remove{cursor:pointer;opacity:.6;}
.chip.chip-cad{background:#fff3e0;color:#c0392b;}
.chip.chip-pdf{background:#e8f5e9;color:#1b5e20;}

/* ── PROGRESS ── */
.progress-bar-wrap{background:#f0f4f8;border-radius:20px;height:10px;overflow:hidden;margin:8px 0;}
.progress-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .3s;}

/* ── AI EXTRACTION ── */
.ai-agent-card{border:1px solid var(--border);border-radius:10px;padding:16px;background:#fff;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.ai-agent-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ai-agent-info{flex:1;}
.ai-agent-name{font-weight:700;font-size:14px;color:var(--primary);}
.ai-agent-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.ai-status-chip{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;}
.ai-idle{background:#f0f4f8;color:var(--muted);}
.ai-running{background:#fff3e0;color:#e65100;animation:pulse 1s infinite;}
.ai-done{background:#e8f5e9;color:#2e7d32;}
.ai-err{background:#fdecea;color:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── AUTOCAD DRAWING ── */
.drawing-canvas{background:#1a1a2e;border-radius:10px;padding:20px;overflow:hidden;position:relative;}
.drawing-canvas svg text{font-family:monospace;}
.drawing-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.draw-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px;}
.draw-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.draw-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ── PICTORIAL TABLE ── */
.pic-table-header{background:linear-gradient(135deg,var(--primary),#2d6a9f);color:#fff;border-radius:10px 10px 0 0;padding:16px 20px;}
.pic-table-header h3{font-size:16px;font-weight:700;}
.pic-table-header p{font-size:12px;opacity:.8;margin-top:4px;}
.pic-grid{display:grid;grid-template-columns:70px 1fr 80px 60px 70px 80px;font-size:12px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.pic-th{background:#f8f9fb;padding:9px 10px;font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-bottom:2px solid var(--border);}
.pic-td{padding:10px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;}
.pic-td.bold{font-weight:700;color:var(--primary);}
.hole-viz{display:flex;gap:3px;align-items:center;flex-wrap:wrap;}
.hole-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #555;background:#fff;display:inline-block;}
.piece-bar{height:14px;background:linear-gradient(90deg,#b8cce4,#7faed4);border-radius:3px;position:relative;min-width:40px;}

/* ── VERIFY ── */
.diff-row{display:grid;grid-template-columns:160px 1fr 1fr 80px;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.diff-ok{color:var(--green);font-weight:700;}
.diff-warn{color:var(--accent);font-weight:700;}
.diff-err{color:var(--red);font-weight:700;}
.ai-check-badge{display:inline-flex;align-items:center;gap:5px;background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}

/* ── ALERT ── */
.alert{border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;display:flex;gap:10px;align-items:flex-start;}
.alert-info{background:#e3f2fd;border-left:4px solid #1976d2;}
.alert-warn{background:#fff8e1;border-left:4px solid #f9a825;}
.alert-success{background:#e8f5e9;border-left:4px solid var(--green);}
.alert-err{background:#fdecea;border-left:4px solid var(--red);}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:12px;font-weight:600;color:var(--text);}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:80px;}

/* ── EMAIL / WHATSAPP ── */
.email-box{background:#fff;border:1px solid var(--border);border-radius:8px;}
.email-header{background:#f8f9fb;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.email-header div{margin-bottom:3px;}
.email-header span{color:var(--muted);min-width:55px;display:inline-block;font-size:12px;}
.email-body{padding:16px;font-size:13px;line-height:1.8;color:var(--text);}

.wa-bubble{background:#dcf8c6;border-radius:12px 12px 0 12px;padding:12px 16px;max-width:80%;font-size:13px;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.wa-wrap{display:flex;justify-content:flex-end;margin-bottom:12px;}
.wa-time{font-size:10px;color:var(--muted);text-align:right;margin-top:3px;}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;}
.tab:hover{color:var(--primary);}
.tab.active{color:var(--primary);border-bottom-color:var(--accent);font-weight:600;}

/* ── INBOX ── */
.inbox-item{display:flex;gap:12px;padding:13px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.2s;background:#fff;}
.inbox-item:hover{border-color:var(--accent);}
.inbox-item.unread{border-left:4px solid var(--accent);}
.inbox-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.inbox-meta{flex:1;}
.inbox-sender{font-weight:700;font-size:13px;color:var(--primary);}
.inbox-subject{font-size:12px;color:var(--text);margin:2px 0;}
.inbox-preview{font-size:11px;color:var(--muted);}
.inbox-time{font-size:10px;color:var(--muted);white-space:nowrap;}
.ch-badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700;}
.ch-email{background:#e3f2fd;color:#1565c0;}
.ch-whatsapp{background:#e8f5e9;color:#2e7d32;}

/* ── DISPATCH ── */
.dispatch-card{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;background:#fff;}
.dispatch-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.db-pending{background:#fff3e0;color:#e65100;}
.db-transit{background:#e3f2fd;color:#1565c0;}
.db-done{background:#e8f5e9;color:#2e7d32;}

/* ── SECTION MODE ── */
.section-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.section-toggle button{flex:1;padding:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;background:#f8f9fb;color:var(--muted);}
.section-toggle button.active{background:var(--primary);color:#fff;}
.section-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;background:#fff;}
.section-item.selected{border-color:var(--green);background:#f0fff4;}
.section-item.skipped{opacity:.55;border-style:dashed;}

/* ── PROPOSAL ── */
.proposal-header{background:linear-gradient(135deg,var(--primary),#2d6a9f);color:#fff;border-radius:12px;padding:24px;margin-bottom:16px;}
.cost-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:13px;}
.cost-line.total{font-weight:700;font-size:15px;border-bottom:none;color:var(--primary);margin-top:6px;}
.cost-val{color:var(--accent);font-weight:700;}

/* ── FEATURE CARDS ── */
.feature-card{border:1px solid var(--border);border-radius:10px;padding:16px;background:#fff;margin-bottom:10px;transition:.2s;}
.feature-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(0,0,0,.08);}
.feature-card h4{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.feature-card p{font-size:12px;color:var(--muted);line-height:1.6;}
.fl-ai{background:#fdecea;color:var(--red);font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;}
.fl-adv{background:#f3e5f5;color:#6a1b9a;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;}
.fl-new{background:#e8f5e9;color:var(--green);font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;}

/* ── MISC ── */
.section-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.divider{height:1px;background:var(--border);margin:18px 0;}
.tag{display:inline-block;background:#e8f0fe;color:#3c5a9a;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin-left:5px;}
.tag-orange{background:#fff3e0;color:#c0392b;}
.weight-box{background:linear-gradient(135deg,var(--primary),#2d6a9f);color:#fff;border-radius:10px;padding:18px;text-align:center;}
.weight-val{font-size:34px;font-weight:800;color:var(--accent);}
.notif{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;}
input[type="file"]{display:none;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.order-header-band{background:linear-gradient(90deg,var(--primary),#2d6a9f);color:#fff;border-radius:10px;padding:18px 22px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.timeline-mini{position:relative;padding-left:18px;}
.timeline-mini::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border);}
.tmi{position:relative;margin-bottom:11px;font-size:12px;padding-left:4px;}
.tmi::before{content:'';position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 0 2px var(--accent);}
.mini-flow{display:flex;gap:0;align-items:center;overflow-x:auto;padding:10px 0;}
.mf-box{background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;white-space:nowrap;font-weight:600;color:var(--primary);cursor:pointer;transition:.2s;}
.mf-box:hover{border-color:var(--accent);background:#fff8f3;}
.mf-arrow{color:var(--muted);margin:0 4px;font-size:16px;}
.badge-count{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;}
</style>
</head>
<body>
<div id="root"></div>

/* ══════════════════════════════════════════
   PAGE: STEP 3 — AI EXTRACTION
══════════════════════════════════════════ */
function Extract({setPage}){
  const [phase,setPhase]=useState('idle'); // idle | running | done
  const [agents,setAgents]=useState([
    {id:'pdf',  name:'PDF Extraction Agent', desc:'pdfplumber — reads tables, text, dimensions from PDF', status:'idle',  icon:'📄',color:'#e3f2fd'},
    {id:'dxf',  name:'DXF/DWG Parser Agent', desc:'ezdxf — parses AutoCAD entities: LWPOLYLINEs, circles, arcs', status:'idle',  icon:'📐',color:'#fff3e0'},
    {id:'vision',name:'Vision AI Agent',     desc:'Claude Vision API — reads scanned drawings, handwritten notes', status:'idle', icon:'👁️',color:'#f3e5f5'},
  ]);
  const [log,setLog]=useState([]);
  const [progress,setProgress]=useState(0);

  const runExtraction=()=>{
    setPhase('running');
    setLog([]);
    const steps=[
      {delay:500,  agentId:'pdf',   status:'running', msg:'📄 PDF Agent: Analyzing G2B drawing file...'},
      {delay:1200, agentId:'pdf',   status:'done',    msg:'✅ PDF Agent: Found 8 pieces, 312 dimensions extracted'},
      {delay:1600, agentId:'dxf',   status:'running', msg:'📐 DXF Agent: Parsing AutoCAD entities...'},
      {delay:2500, agentId:'dxf',   status:'done',    msg:'✅ DXF Agent: 47 LWPOLYLINE entities, 96 holes parsed'},
      {delay:2800, agentId:'vision',status:'running', msg:'👁️ Vision Agent: Verifying with Claude Vision API...'},
      {delay:3800, agentId:'vision',status:'done',    msg:'✅ Vision Agent: Drawing matches — 98.4% confidence'},
      {delay:4000, agentId:null,    status:null,       msg:'🎯 All agents complete. Building pictorial table...'},
    ];
    steps.forEach(s=>{
      setTimeout(()=>{
        if(s.agentId){
          setAgents(prev=>prev.map(a=>a.id===s.agentId?{...a,status:s.status}:a));
        } else {
          setPhase('done');
        }
        setLog(prev=>[...prev,{time:new Date().toLocaleTimeString(),msg:s.msg}]);
        setProgress(Math.min(100, Math.floor((steps.indexOf(s)+1)/steps.length*100)));
      },s.delay);
    });
  };

  const statusClass={idle:'ai-idle',running:'ai-running',done:'ai-done',error:'ai-err'};

  return(
    <div className="page">
      <div className="alert alert-info"><span>ℹ️</span><div>Step 3: 3 AI agents automatically extract data from uploaded files — PDF, DXF/DWG, ya scanned image.</div></div>

      <div className="two-col">
        <div>
          <div className="card">
            <SectionHead>🤖 AI Extraction Agents</SectionHead>
            {agents.map(a=>(
              <div key={a.id} className="ai-agent-card">
                <div className="ai-agent-icon" style={{background:a.color}}>{a.icon}</div>
                <div className="ai-agent-info">
                  <div className="ai-agent-name">{a.name}</div>
                  <div className="ai-agent-desc">{a.desc}</div>
                </div>
                <span className={`ai-status-chip ${statusClass[a.status]}`}>
                  {a.status==='running'?'⚙️ Running...':a.status==='done'?'✅ Done':'⏳ Idle'}

function DispatchTracker(){
  const [orders,setOrders]=useState(DISPATCH_ORDERS);
  const update=(id,field,val)=>setOrders(prev=>prev.map(o=>o.id===id?{...o,[field]:val}:o));
  return(
    <div className="page">
      <div className="three-col" style={{marginBottom:16}}>
        {[['⏳','Pending',orders.filter(o=>o.status==='pending').length,'var(--accent)'],
          ['🚛','In Transit',orders.filter(o=>o.status==='transit').length,'var(--blue)'],
          ['✅','Dispatched',orders.filter(o=>o.status==='done').length,'var(--green)']].map(([i,l,c,col])=>(
          <div className="stat-card" key={l}><span className="stat-icon">{i}</span><div className="stat-val" style={{color:col}}>{c}</div><div className="stat-lbl">{l}</div></div>
        ))}
      </div>
      {orders.map(o=>(
        <div className="card" key={o.id}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <span style={{fontWeight:700,color:'var(--primary)',fontSize:15}}>#{o.id}</span>
              <span style={{marginLeft:10,color:'var(--muted)'}}>{o.party}</span>
            </div>
            <span className={`dispatch-badge ${o.status==='pending'?'db-pending':o.status==='transit'?'db-transit':'db-done'}`} style={{fontSize:13,padding:'6px 14px'}}>
              {o.status==='pending'?'⏳ Pending':o.status==='transit'?'🚛 In Transit':'✅ Dispatched'}
            </span>
          </div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>⚖️ {o.weight} | 📦 {o.pieces} pieces {o.time&&`| 🕒 ${o.time}`}</div>
          {o.status!=='done' && (
            <div>
              <div className="form-row">
                <div className="form-group"><label>Vehicle Number</label>
                  <input placeholder="e.g. MH-12 AB 4567" value={o.vehicle} onChange={e=>update(o.id,'vehicle',e.target.value)}/>
                </div>
                <div className="form-group"><label>Driver Name</label>
                  <input placeholder="e.g. Ramesh Kumar" value={o.driver} onChange={e=>update(o.id,'driver',e.target.value)}/>
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                {o.status==='pending' && <button className="btn btn-primary btn-sm" onClick={()=>update(o.id,'status','transit')}>🚛 Mark In Transit</button>}
                {o.status==='transit' && <button className="btn btn-green btn-sm" onClick={()=>update(o.id,'status','done')}>✅ Mark Dispatched</button>}
              </div>
            </div>
          )}
          {o.status==='done' && <div className="alert alert-success" style={{margin:0}}><span>✅</span><div>Dispatched by {o.driver} via {o.vehicle}</div></div>}
        </div>
      ))}
    </div>
  );
}

    </svg>
  );
  if(shape==='rod') return (
    <svg width={w} height={h} viewBox="0 0 100 80">
      <rect x="5" y="35" width="90" height="10" fill={color} rx="2"/>
      {[5,10,15,20,25].map(x=><line key={x} x1={x} y1="33" x2={x} y2="47" stroke="#fff" strokeWidth="1.2"/>)}

      <text x="38" y="68" fill={color} fontSize="8" fontFamily="monospace">Rod Dia</text>
    </svg>
  );
  if(shape==='bend_rod') return (
    <svg width={w} height={h} viewBox="0 0 100 80">
      <line x1="10" y1="60" x2="30" y2="40" stroke={color} strokeWidth="6" strokeLinecap="round"/>
      <line x1="30" y1="40" x2="85" y2="40" stroke={color} strokeWidth="6" strokeLinecap="round"/>
      <line x1="85" y1="40" x2="95" y2="40" stroke={color} strokeWidth="6" strokeLinecap="round"/>
      {[10,14,18,22].map(i=><line key={i} x1={i} y1={66-i+10} x2={i+2} y2={64-i+10} stroke="#fff" strokeWidth="1.5"/>)}
      {[80,84,88,92,96].map(x=><line key={x} x1={x} y1="37" x2={x} y2="43" stroke="#fff" strokeWidth="1.5"/>)}
      <text x="5"  y="76" fill={color} fontSize="7" fontFamily="monospace">52mm</text>
      <text x="76" y="55" fill={color} fontSize="7" fontFamily="monospace">52mm</text>
      <text x="42" y="35" fill={color} fontSize="7" fontFamily="monospace">21°</text>
    </svg>
  );
  return null;
};

        <div className="sidebar-logo">
          <h2>🏗️ Pushpak Infra Steel</h2>
          <span>Purlin Automation Platform</span>
          <div className="powered">Powered by Wizone AI Labs</div>
        </div>

        <div className="nav-section">
          <div className="nav-section-label">Main Dashboard</div>
          <div className={`nav-item ${page==='dashboard'?'active':''}`} onClick={()=>setPage('dashboard')}>
            <span className="nav-icon">📊</span> Dashboard
          </div>
        </div>

        <div className="nav-section">
          <div className="nav-section-label">9-Step Workflow</div>
          {WORKFLOW_STEPS.filter(s=>s.step).map(s=>{
            const isDone=activeStep>s.step;
            const isActive=page===s.id;
            return(
              <div key={s.id} className={`nav-item ${isActive?'active':''}`} onClick={()=>setPage(s.id)}>
                <span className={`nav-step-num ${isDone?'done':isActive?'active':''}`}>{isDone?'✓':s.step}</span>
                <span style={{flex:1}}>{s.label}</span>
                {s.badge && <span className="nav-badge new-badge">{s.badge}</span>}
              </div>
            );
          })}
        </div>

        <div className="nav-section">
          <div className="nav-section-label">Extra Modules</div>
          {EXTRA_ITEMS.map(s=>(
            <div key={s.id} className={`nav-item ${page===s.id?'active':''}`} onClick={()=>setPage(s.id)}>
              <span className="nav-icon">{s.icon}</span>
              <span style={{flex:1}}>{s.label}</span>
              {s.badge && <span className="nav-badge">{s.badge}</span>}
            </div>
          ))}
        </div>

        <div className="sidebar-footer">v1.0 Demo · June 2026</div>
      </div>

      {/* MAIN */}
      <div className="main">
        {/* Topbar */}
        <div className="topbar">
          <div className="topbar-left">
            <div className="topbar h1" style={{fontSize:17}}>{pageTitles[page]||page}</div>
          </div>
          <div className="topbar-right">
            <div className="topbar-pill">👤 Admin · Narayan Mishra</div>
            <div className="topbar-pill" style={{background:'#e8f5e9',color:'var(--green)'}}>🟢 System Live</div>
            <button className="btn btn-accent btn-sm" onClick={()=>setPage('inquiry')}>+ New Order</button>
          </div>
        </div>

        {/* Workflow progress bar */}
        {activeStep>0 && (
          <div className="workflow-bar">
            <div className="workflow-steps">
              {wfItems.map((s,i)=>{
                const done=activeStep>s.n;
                const active=activeStep===s.n;
                return(
                  <React.Fragment key={s.id}>
                    <div className="wf-step">
                      <div className="wf-dot-wrap" onClick={()=>setPage(s.id)}>
                        <div className={`wf-dot ${done?'wf-done':active?'wf-active':''}`}>{done?'✓':s.n}</div>
                        <div className={`wf-label ${done?'wf-done':active?'wf-active':''}`}>{s.lbl}</div>
                      </div>
                    </div>
                    {i<wfItems.length-1 && <div className={`wf-line ${done?'wf-done':''}`}/>}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        )}

        {/* Page content */}
        {renderPage()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
